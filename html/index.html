<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading...</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="slideshow"></div>

<div id="grain"></div>
<div id="vignette"></div>
<div id="scanlines"></div>

<audio id="bgm" preload="auto"></audio>

<div id="header">
  <div style="position:relative;">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="header-inner">
      <div class="emblem">
        <div class="emblem-ring"></div>
      </div>
      <div class="title-block">
        <div class="server-name" id="server-name-el"></div>
        <div class="server-sub"  id="server-sub-el"></div>
      </div>
      <div class="header-stats">
        <div class="stat-pill">SECURE CONNECTION <span class="blink">▮</span></div>
        <div class="stat-pill" id="live-time">UTC+1 00:00:00</div>
        <div class="stat-pill">FiveM MilSim RP</div>
      </div>
    </div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
  </div>
</div>

<div id="media-player">
  <div class="mp-header">
    <span class="mp-header-title">◈ AUDIO SYSTEM</span>
    <div class="mp-signal">
      <div class="mp-signal-bar" id="sb1" style="height:4px"></div>
      <div class="mp-signal-bar" id="sb2" style="height:7px"></div>
      <div class="mp-signal-bar" id="sb3" style="height:11px"></div>
      <div class="mp-signal-bar" id="sb4" style="height:8px"></div>
      <div class="mp-signal-bar" id="sb5" style="height:5px"></div>
    </div>
  </div>
  <div class="mp-track">
    <div class="mp-track-name" id="mp-title">— KEIN TRACK GELADEN —</div>
    <div class="mp-track-sub"  id="mp-sub">PLAYLIST LEER</div>
  </div>
  <div class="mp-wave" id="mp-wave"></div>
  <div class="mp-seek-wrap">
    <span class="mp-time" id="mp-cur">0:00</span>
    <div class="mp-seek" id="mp-seek">
      <div class="mp-seek-fill" id="mp-seek-fill"></div>
    </div>
    <span class="mp-time right" id="mp-dur">0:00</span>
  </div>
  <div class="mp-controls">
    <button class="mp-btn"      id="btn-prev">◀◀</button>
    <button class="mp-btn play-btn" id="btn-play">▶</button>
    <button class="mp-btn"      id="btn-next">▶▶</button>
    <button class="mp-btn"      id="btn-loop">↺</button>
    <div class="mp-vol-wrap">
      <span class="mp-vol-icon">VOL</span>
      <div class="mp-vol" id="mp-vol">
        <div class="mp-vol-fill" id="mp-vol-fill"></div>
      </div>
    </div>
  </div>
  <div class="mp-playlist" id="mp-playlist"></div>
</div>

<div id="player-panel">
  <div class="panel-header">
    <span class="panel-header-title">◈ PLAYERLIST</span>
    <div style="display:flex;align-items:center;gap:6px">
      <div id="status-dot" style="width:7px;height:7px;border-radius:50%;background:#555;transition:all 0.4s"></div>
      <span class="player-count" id="player-count-label">… / 64</span>
    </div>
  </div>
  <div class="player-list" id="player-list"></div>
</div>

<div class="hud-corner" id="hud-br">
  SERVER: <span id="hud-server-label"></span><br>
  ENGINE: FiveM<br>
  <span id="fps-counter">FPS: --</span>
</div>

<div id="loading-bar-wrap">
  <div class="loading-top">
    <span class="loading-label"  id="loading-text">INITIALISIERE VERBINDUNG...</span>
    <span class="loading-percent" id="loading-pct">0%</span>
  </div>
  <div class="bar-track">
    <div class="bar-fill" id="bar-fill">
      <div class="bar-segments">
        <div class="bar-segment"></div><div class="bar-segment"></div>
        <div class="bar-segment"></div><div class="bar-segment"></div>
        <div class="bar-segment"></div><div class="bar-segment"></div>
        <div class="bar-segment"></div><div class="bar-segment"></div>
        <div class="bar-segment"></div><div class="bar-segment"></div>
        <div class="bar-segment"></div><div class="bar-segment"></div>
        <div class="bar-segment"></div><div class="bar-segment"></div>
        <div class="bar-segment"></div><div class="bar-segment"></div>
        <div class="bar-segment"></div><div class="bar-segment"></div>
        <div class="bar-segment"></div><div class="bar-segment"></div>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
